<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --border:     rgba(255,255,255,.07);
      --accent:     #7c6aff;
      --accent-dim: rgba(124,106,255,.15);
      --accent-glow:rgba(124,106,255,.35);
      --text:       #e8e6f0;
      --text-muted: rgba(232,230,240,.4);
      --user-bg:    rgba(124,106,255,.18);
      --bot-bg:     rgba(255,255,255,.04);
      --radius:     16px;
      --font-ui:    'Syne', sans-serif;
      --font-mono:  'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Noise overlay ──────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .03;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      height: 100dvh;
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent);
      display: grid; place-items: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    .bot-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--text);
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .04em;
    }

    #clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Messages ───────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #messages::-webkit-scrollbar      { width: 4px; }
    #messages::-webkit-scrollbar-track{ background: transparent; }
    #messages::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 2px; }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
      pointer-events: none;
    }

    #empty-state .big-icon {
      font-size: 48px;
      filter: grayscale(1) opacity(.4);
      margin-bottom: 4px;
    }

    #empty-state h2 {
      font-size: 18px;
      font-weight: 700;
      color: rgba(232,230,240,.6);
    }

    #empty-state p {
      font-size: 13px;
      font-family: var(--font-mono);
      max-width: 260px;
      line-height: 1.6;
    }

    /* ── Bubble ──────────────────────────────────────────────── */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: slideIn .25s ease both;
    }

    .bubble-row.user  { flex-direction: row-reverse; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      max-width: min(72%, 580px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bubble.user {
      background: var(--user-bg);
      border: 1px solid rgba(124,106,255,.3);
      border-bottom-right-radius: 4px;
      color: #d4cfff;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble-mini-avatar {
      width: 26px; height: 26px;
      border-radius: 8px;
      background: var(--accent);
      display: grid; place-items: center;
      font-size: 13px;
      flex-shrink: 0;
      box-shadow: 0 0 10px var(--accent-glow);
      margin-bottom: 2px;
    }

    /* ── Typing indicator ────────────────────────────────────── */
    #typing-indicator {
      display: none;
      align-items: flex-end;
      gap: 8px;
      animation: slideIn .2s ease both;
    }

    #typing-indicator.visible { display: flex; }

    .typing-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce .9s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* ── Error bubble ────────────────────────────────────────── */
    .bubble.error {
      background: rgba(239,68,68,.08);
      border-color: rgba(239,68,68,.25);
      color: #fca5a5;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* ── Timestamp ───────────────────────────────────────────── */
    .meta {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .bubble-row.user .meta  { text-align: right; }
    .bubble-row.bot  .meta  { text-align: left; }

    /* ── Input area ──────────────────────────────────────────── */
    #input-area {
      padding: 16px 0 24px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    #form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color .2s, box-shadow .2s;
    }

    #form:focus-within {
      border-color: rgba(124,106,255,.5);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s, box-shadow .2s;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    #send-btn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    #send-btn:active:not(:disabled) { transform: scale(.95); }

    #send-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      box-shadow: none;
    }

    #send-btn svg {
      width: 16px; height: 16px;
      fill: #fff;
      transform: translateX(1px);
    }

    .hint {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: .02em;
    }

    kbd {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .bubble { max-width: 88%; }
      .bot-name { font-size: 14px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="bot-name">Assistant</div>
        <div class="status-line">
          <span class="status-dot"></span>
          <span id="status-text">online</span>
        </div>
      </div>
    </div>
    <button id="clear-btn" title="Clear conversation">↺ clear</button>
  </header>

  <!-- Messages -->
  <div id="messages" role="log" aria-live="polite" aria-label="Chat messages">

    <!-- Empty state -->
    <div id="empty-state">
      <div class="big-icon">💬</div>
      <h2>Start a conversation</h2>
      <p>Ask anything — I'm ready to help.</p>
    </div>

    <!-- Typing indicator (hidden by default) -->
    <div id="typing-indicator" aria-label="Bot is typing" role="status">
      <div class="bubble-mini-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

  </div>

  <!-- Input -->
  <div id="input-area">
    <div id="form">
      <textarea
        id="input"
        rows="1"
        placeholder="Message…"
        aria-label="Message input"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" aria-label="Send message" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="hint">
      Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
    </p>
  </div>

</div>

<script>
  (() => {
    'use strict';

    // ── Config ──────────────────────────────────────────────────
    const API_ENDPOINT = '/api/chat';   // change if hosting separately

    // ── Session ─────────────────────────────────────────────────
    let sessionId = localStorage.getItem('chat_session_id');
    if (!sessionId) {
      sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      localStorage.setItem('chat_session_id', sessionId);
    }

    // ── DOM refs ─────────────────────────────────────────────────
    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('input');
    const sendBtn     = document.getElementById('send-btn');
    const clearBtn    = document.getElementById('clear-btn');
    const typingEl    = document.getElementById('typing-indicator');
    const emptyEl     = document.getElementById('empty-state');
    const statusEl    = document.getElementById('status-text');

    let isBusy = false;
    let messageCount = 0;

    // ── Auto-resize textarea ─────────────────────────────────────
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    }

    inputEl.addEventListener('input', () => {
      autoResize();
      sendBtn.disabled = !inputEl.value.trim() || isBusy;
    });

    // ── Keyboard shortcuts ───────────────────────────────────────
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isBusy && inputEl.value.trim()) sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Clear conversation ───────────────────────────────────────
    clearBtn.addEventListener('click', async () => {
      if (!confirm('Clear the conversation?')) return;

      // Ask server to wipe history
      await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'clear', sessionId }),
      }).catch(() => {});

      // Remove all bubble rows (keep empty + typing nodes)
      document.querySelectorAll('.bubble-row').forEach(el => el.remove());
      messageCount = 0;
      emptyEl.style.display = '';
    });

    // ── Render a message bubble ──────────────────────────────────
    function addBubble(text, role, isError = false) {
      if (messageCount === 0) emptyEl.style.display = 'none';
      messageCount++;

      const row = document.createElement('div');
      row.className = `bubble-row ${role}`;

      const timeStr = new Date().toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit',
      });

      if (role === 'bot') {
        const miniAvatar = document.createElement('div');
        miniAvatar.className = 'bubble-mini-avatar';
        miniAvatar.textContent = '🤖';
        row.appendChild(miniAvatar);
      }

      const wrapper = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
      bubble.textContent = text;

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = timeStr;

      wrapper.appendChild(bubble);
      wrapper.appendChild(meta);
      row.appendChild(wrapper);

      // Insert before the typing indicator
      messagesEl.insertBefore(row, typingEl);
      scrollToBottom();

      return bubble;
    }

    // ── Show / hide typing indicator ────────────────────────────
    function setTyping(visible) {
      typingEl.classList.toggle('visible', visible);
      if (visible) scrollToBottom();
    }

    // ── Scroll to latest message ─────────────────────────────────
    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    // ── Update status bar ────────────────────────────────────────
    function setStatus(text) {
      statusEl.textContent = text;
    }

    // ── setBusy ──────────────────────────────────────────────────
    function setBusy(busy) {
      isBusy = busy;
      inputEl.disabled  = busy;
      sendBtn.disabled  = busy || !inputEl.value.trim();
      setTyping(busy);
      setStatus(busy ? 'thinking…' : 'online');
    }

    // ── Core send function ───────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isBusy) return;

      // Reset input
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      // Render user bubble
      addBubble(text, 'user');
      setBusy(true);

      try {
        const res = await fetch(API_ENDPOINT, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message: text, sessionId }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error ?? `HTTP ${res.status}`);
        }

        const data = await res.json();

        // Update sessionId in case server generated one
        if (data.sessionId) {
          sessionId = data.sessionId;
          localStorage.setItem('chat_session_id', sessionId);
        }

        addBubble(data.reply, 'bot');

      } catch (err) {
        console.error('Chat error:', err);
        addBubble(
          '⚠ ' + (err.message || 'Something went wrong. Please try again.'),
          'bot',
          true
        );
      } finally {
        setBusy(false);
        inputEl.focus();
      }
    }
  })();
</script>
</body>
</html>
